<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your MindCare account password securely.">
    <title>Forgot Password — MindCare</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="card-wrapper">
        <div class="brand-panel">
            <div class="brand-logo">
                <i class="fa-solid fa-heart-pulse"></i>
            </div>
            <h1 class="brand-title">MindCare</h1>
            <p class="brand-subtitle">Reset your password and get back to your wellness journey.</p>
            <ul class="brand-features">
                <li><i class="fa-solid fa-check-circle"></i> Fast and secure reset</li>
                <li><i class="fa-solid fa-check-circle"></i> Keep your account protected</li>
                <li><i class="fa-solid fa-check-circle"></i> Continue your progress</li>
            </ul>
        </div>

        <div class="form-panel">
            <div class="form-header">
                <h2>Reset Password</h2>
                <p>Enter your email and choose a new password</p>
            </div>

            <form id="forgotForm" novalidate>
                <div class="input-group" id="emailGroup">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="Enter your registered email" autocomplete="email" required>
                    </div>
                    <span class="error-msg" id="emailError"></span>
                </div>

                <div class="input-group" id="passwordGroup">
                    <label for="newPassword">New Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="newPassword" placeholder="Enter new password" autocomplete="new-password" required>
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <span class="error-msg" id="passwordError"></span>
                </div>

                <div class="input-group" id="confirmGroup">
                    <label for="confirmPassword">Confirm New Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-shield-halved input-icon"></i>
                        <input type="password" id="confirmPassword" placeholder="Re-enter new password" autocomplete="new-password" required>
                    </div>
                    <span class="error-msg" id="confirmError"></span>
                </div>

                <button type="submit" class="btn-login" id="resetBtn">
                    <span class="btn-text">Reset Password</span>
                    <i class="fa-solid fa-key btn-icon"></i>
                </button>

                <div class="divider"><span>or</span></div>
                <p class="register-link">Back to <a href="login.html">Sign In</a></p>
                <p class="crisis-note">
                    <i class="fa-solid fa-phone-volume"></i>
                    In crisis? Call <a href="tel:9152987821">iCall: 9152987821</a>
                </p>
            </form>
        </div>
    </div>

    <script src="../js/forgot-password.js"></script>
</body>

</html>
