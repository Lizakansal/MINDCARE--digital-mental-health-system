<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Set a new password for your MindCare account.">
    <title>Reset Password - MindCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="card-wrapper">
        <div class="brand-panel">
            <div class="brand-logo">
                <i class="fa-solid fa-heart-pulse"></i>
            </div>
            <h1 class="brand-title">MindCare</h1>
            <p class="brand-subtitle">Choose a strong new password to keep your account secure.</p>
        </div>

        <div class="form-panel">
            <div class="form-header">
                <h2>Reset Password</h2>
                <p>Enter and confirm your new password</p>
            </div>

            <form id="resetForm" novalidate>
                <div class="input-group" id="passwordGroup">
                    <label for="newPassword">New Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            <i class="fa-solid fa-eye-slash" id="eyeIcon"></i>
                        </button>
                    </div>
                    <span class="error-msg" id="passwordError"></span>
                </div>

                <div class="input-group" id="confirmGroup">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-shield-halved input-icon"></i>
                        <input type="password" id="confirmPassword" placeholder="Re-enter new password" required>
                    </div>
                    <span class="error-msg" id="confirmError"></span>
                </div>

                <button type="submit" class="btn-login" id="resetBtn">
                    <span class="btn-text">Reset Password</span>
                    <i class="fa-solid fa-key btn-icon"></i>
                </button>

                <div class="divider"><span>or</span></div>
                <p class="register-link">Back to <a href="login.html">Sign In</a></p>
            </form>
        </div>
    </div>

    <script src="../js/reset-password.js"></script>
</body>
</html>
